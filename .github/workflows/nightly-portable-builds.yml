name: nightly-portable-builds

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-portable:
    name: portable-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable package
        run: npm run package:portable

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: poke-engine-portable-${{ matrix.os }}
          path: release/portable-*
          if-no-files-found: error
          retention-days: 14
