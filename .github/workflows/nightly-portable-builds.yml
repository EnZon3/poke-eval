name: nightly-portable-builds

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prep-tag:
    name: prepare-nightly-tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      title: ${{ steps.meta.outputs.title }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Compute nightly tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); process.stdout.write(p.version)")
          DATE_UTC=$(date -u +%Y%m%d)
          TAG="v${VERSION}+nightly.${DATE_UTC}.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          TITLE="Nightly build v${VERSION} (${DATE_UTC})"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

  build-portable-assets:
    name: portable-assets-all-platforms
    needs: prep-tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable packages
        run: npm run package:portable:all

      - name: Upload portable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: poke-engine-nightly-portables
          path: |
            release/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  build-binary-assets:
    name: binaries-${{ matrix.os }}
    needs: prep-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin_script: package:bin:linux-x64
          - os: windows-latest
            bin_script: package:bin:win-x64
          - os: macos-latest
            bin_script: package:bin:macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build single-file binary
        run: npm run ${{ matrix.bin_script }}

      - name: Build extra macOS binary target
        if: runner.os == 'macOS'
        run: npm run package:bin:macos-x64

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: poke-engine-nightly-binaries-${{ matrix.os }}
          path: |
            release/poke-engine-linux-x64
            release/poke-engine-macos-x64
            release/poke-engine-macos-arm64
            release/poke-engine-win-x64.exe
          if-no-files-found: error
          retention-days: 14

  publish-nightly-prerelease:
    name: publish-nightly-prerelease
    needs: [prep-tag, build-portable-assets, build-binary-assets]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create nightly pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prep-tag.outputs.tag }}
          name: ${{ needs.prep-tag.outputs.title }}
          prerelease: true
          make_latest: false
          body: |
            Automated nightly builds.

            This pre-release uses a nightly tag
            `${{ needs.prep-tag.outputs.tag }}`
            See [recent commits on this branch](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/poke-engine-linux-x64
            release-assets/**/poke-engine-macos-x64
            release-assets/**/poke-engine-macos-arm64
            release-assets/**/poke-engine-win-x64.exe
