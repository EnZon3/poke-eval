name: Feature request
description: Suggest an enhancement for poke-engine
title: "[Feature]: "
labels:
  - type: feature
  - status: needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.
        Share the problem first, then the proposed solution.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What workflow or use case is currently blocked or painful?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternatives or workarounds you considered.

  - type: dropdown
    id: area
    attributes:
      label: Primary area
      options:
        - Mechanics and accuracy
        - Evaluation/scoring
        - Team input/import
        - CLI
        - TUI
        - Build/release
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, references, or examples.
