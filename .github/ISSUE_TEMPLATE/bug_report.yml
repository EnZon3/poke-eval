name: Bug report
description: Report a reproducible problem with poke-engine
title: "[Bug]: "
labels:
  - type: bug
  - status: needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please provide enough detail to reproduce the issue quickly.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this issue on the latest version from `main`.
          required: true

  - type: dropdown
    id: mode
    attributes:
      label: Runtime mode
      description: Which mode were you using when the issue happened?
      options:
        - CLI
        - TUI
        - Programmatic API
        - Packaged binary
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command/options used
      description: Include the exact command and options used.
      placeholder: npm start -- --my=my-team.json --enemy=enemy-team.json --json
    validations:
      required: true

  - type: textarea
    id: inputs
    attributes:
      label: Input teams or reproducer
      description: Paste sanitized team inputs, files, or a minimal reproducer.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Relevant output or stack trace
      render: shell

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: node -v
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 15, Ubuntu 24.04, Windows 11
    validations:
      required: true
